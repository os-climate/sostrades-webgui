<div class="dashboard-container">
  <div class="dashboard-toolbar">
    <div class="edit-save-button">
      <button
        id="add-text"
        matTooltip="Add text"
        mat-raised-button
        color="primary"
        class="float-right-button"
        (click)="onAddText()"
        *ngIf="this.options.draggable.enabled"
      >
        <mat-icon>text_fields</mat-icon>
        Add Text
      </button>
      <button
        id="add-section"
        matTooltip="Add section"
        mat-raised-button
        color="primary"
        class="float-right-button"
        (click)="onAddSection()"
        *ngIf="this.options.draggable.enabled"
      >
        <i class="fa-solid fa-folder-open"></i>
        Add Section
      </button>
      <button
        id="reorder-dashboard"
        matTooltip="Reorder dashboard"
        mat-raised-button
        color="primary"
        class="float-right-button"
        *ngIf="this.options.draggable.enabled"
        (click)="onAutoFit()"
      >
        <i class="fa-solid fa-rotate-right"></i>
        Auto-fit
      </button>
      <button
        id="save-dashboard"
        *ngIf="this.options.draggable.enabled"
        [disabled]="!isDashboardUpdated"
        matTooltip="Update saved dashboard"
        mat-raised-button
        color="primary"
        class="float-right-button"
        (click)="OnSaveDashboard()"
      >
        <i class="fa-solid fa-floppy-disk"></i>
        Save
      </button>
      <button
        id="edit-dashboard"
        matTooltip="Edit dashboard"
        mat-raised-button
        color="primary"
        class="float-right-button"
        (click)="handleEditButtonClick(slideToggle)"
      >
        <mat-slide-toggle #slideToggle [checked]="options.draggable.enabled" (change)="onSlideToggleChange($event)">
        </mat-slide-toggle>
        Edit
      </button>
    </div>
  </div>
  <div
    *ngIf="getDisplayItems().length > 0; else noDashboard"
    class="plot-resize-zone"
  >
    <div class="gridster-container">
      <gridster [options]="options">
        <ng-container *ngFor="let itemId of getDisplayItems()" [ngSwitch]="getItemLayout(itemId).item_type">
          <gridster-item [item]="getItemLayout(itemId)">
            <div *ngSwitchCase="itemType.graph" class="graph-card" >
              <button mat-button color="primary" class="drag-handle" matTooltip="Move Graph" [style.visibility]="options.draggable.enabled ? 'visible' : 'hidden'">
                <i class="fa-solid fa-arrows-up-down-left-right"></i>
              </button>
              <div *ngIf="getGraphData(itemId).graphData && getGraphData(itemId).graphData.data && getGraphData(itemId).graphData.data.length > 0" class="graph-container">
              <app-post-processing-plotly 
                [class]="getGraphData(itemId).graphData?.data[0]?.type === 'table' ? 'table' : 'plot'"
                [fullNamespace]=""
                [plotData]="getGraphData(itemId).graphData"
                [disciplineName]="getGraphData(itemId).disciplineName"
                [name]="getGraphData(itemId).name"
                [filters]="getGraphData(itemId).postProcessingFilters"
                [plotIndex]="getGraphData(itemId).plotIndex"
                [height]="calculateGraphHeight(getItemLayout(itemId))"
                [width]="calculateGraphWidth(getItemLayout(itemId))"
                [isEditing]="options.draggable.enabled">
              </app-post-processing-plotly>
              </div>
              <!-- Show warning if graph data empty -->
             <div *ngIf="!getGraphData(itemId).graphData || !getGraphData(itemId).graphData.data || getGraphData(itemId).graphData.data.length === 0" 
             class="no-graph-data-container">
              <div class="no-graph-data-warning">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span>No data available for this chart.</span>
                <button mat-button color="warn" (click)="deleteUnavailableItem(itemId)" matTooltip="Remove chart from dashboard">
                  <i class="fa-solid fa-trash"></i>
                </button>
              </div>
             </div>
            </div>
            
            <div *ngSwitchCase="itemType.text" class="text-card">
              <app-dashboard-text-item
                [textId]="itemId"
                [textItemData]="getTextData(itemId)"
                [inEditionMode]="options.draggable.enabled">
              </app-dashboard-text-item>
            </div>
            <div *ngSwitchCase="itemType.section" class="section-card">
              <app-dashboard-section-item
                [sectionItem]="getSectionItem(itemId)"
                [inEditionMode]="options.draggable.enabled">
              </app-dashboard-section-item>
            </div>
          </gridster-item>
        </ng-container>
      </gridster>
    </div>
  </div>
  <ng-template #noDashboard>
    <div class="missing-dashboard">
      <span>This Dashboard has no items yet.</span>
      <br>
      <span>You can start editing the dashboard by pressing the edit switch.</span>
      <br>
      <span>To add graphs go to the charts tab after while you are in edition mode.</span>
    </div>
  </ng-template>
</div>
